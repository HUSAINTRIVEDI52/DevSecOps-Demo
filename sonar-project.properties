sonar.projectKey=vulnerable-app
sonar.projectName=Vulnerable App
sonar.projectVersion=1.0.0
sonar.sources=.
sonar.exclusions=node_modules/**,test/**,.git/**,.github/**,coverage/**
sonar.tests=test-vulnerabilities.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8

# Quality Gate settings
sonar.qualitygate.wait=true

# Issue severity thresholds
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=node_modules/**
