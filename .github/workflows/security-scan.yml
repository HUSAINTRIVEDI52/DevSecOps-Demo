name: Security Scanning - Dependency Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    name: OWASP Dependency Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Vulnerable App'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableRetired
            --exclude node_modules
            --exclude .git
            --exclude .github

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

      - name: Parse Dependency Check Results
        if: always()
        run: |
          if [ -f reports/dependency-check-report.json ]; then
            echo "📊 Dependency Check Results:"
            cat reports/dependency-check-report.json | jq '.reportSchema' || echo "Report generated"
          fi

      - name: Check for Critical CVEs
        if: always()
        run: |
          if [ -f reports/dependency-check-report.json ]; then
            CRITICAL=$(cat reports/dependency-check-report.json | jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length')
            HIGH=$(cat reports/dependency-check-report.json | jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length')

            echo "Critical CVEs: $CRITICAL"
            echo "High CVEs: $HIGH"

            if [ "$CRITICAL" -gt 0 ]; then
              echo "⚠️ Critical vulnerabilities found - review required"
            fi
          fi

      - name: Comment PR with Dependency Check Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔍 OWASP Dependency Check Results\n\n';

            if (fs.existsSync('reports/dependency-check-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('reports/dependency-check-report.json', 'utf8'));
                const deps = report.dependencies || [];

                let criticalCount = 0;
                let highCount = 0;

                deps.forEach(dep => {
                  if (dep.vulnerabilities) {
                    dep.vulnerabilities.forEach(vuln => {
                      if (vuln.severity === 'CRITICAL') criticalCount++;
                      if (vuln.severity === 'HIGH') highCount++;
                    });
                  }
                });

                comment += `- **Critical**: ${criticalCount}\n`;
                comment += `- **High**: ${highCount}\n`;
                comment += `- **Total Dependencies**: ${deps.length}\n\n`;

                if (criticalCount > 0) {
                  comment += '⚠️ **Critical vulnerabilities detected - review required**\n';
                } else {
                  comment += '✅ No critical vulnerabilities detected\n';
                }
              } catch (e) {
                comment += '✅ Dependency check completed\n';
              }
            } else {
              comment += '✅ No vulnerabilities detected\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  npm-audit:
    runs-on: ubuntu-latest
    name: npm Audit

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Generate npm Audit Report
        run: |
          npm audit --json > npm-audit-report.json || true
          cat npm-audit-report.json | jq '.metadata' || echo "Audit completed"

      - name: Upload npm Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary
    needs: [dependency-check, npm-audit]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4

      - name: Generate Security Summary
        run: |
          echo "# 🔒 Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Dependency Check" >> security-summary.md
          if [ -f dependency-check-report/dependency-check-report.json ]; then
            echo "✅ Completed" >> security-summary.md
          else
            echo "⚠️ No report generated" >> security-summary.md
          fi
          echo "" >> security-summary.md
          echo "## npm Audit" >> security-summary.md
          if [ -f npm-audit-report/npm-audit-report.json ]; then
            echo "✅ Completed" >> security-summary.md
          else
            echo "⚠️ No report generated" >> security-summary.md
          fi
          cat security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
