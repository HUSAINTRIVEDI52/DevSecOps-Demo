name: Code Quality & Linting

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>/dev/null || echo "Linting completed"

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Generate Code Quality Report
        run: |
          echo "# Code Quality Report" > code-quality-report.md
          echo "" >> code-quality-report.md
          echo "## Linting Results" >> code-quality-report.md
          npm run lint 2>&1 | head -50 >> code-quality-report.md || echo "✅ Linting passed" >> code-quality-report.md
          echo "" >> code-quality-report.md
          echo "## Dependency Audit" >> code-quality-report.md
          npm audit --json 2>/dev/null | jq '.metadata' >> code-quality-report.md || echo "✅ Audit completed" >> code-quality-report.md
          cat code-quality-report.md

      - name: Upload Code Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report
          path: code-quality-report.md

      - name: Comment PR with Code Quality Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📊 Code Quality Check\n\n';

            if (fs.existsSync('code-quality-report.md')) {
              const report = fs.readFileSync('code-quality-report.md', 'utf8');
              comment += report;
            } else {
              comment += '✅ Code quality checks passed\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
