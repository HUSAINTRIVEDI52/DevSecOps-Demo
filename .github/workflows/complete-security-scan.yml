name: Complete Security Scanning - Secrets & Dependencies

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    name: Gitleaks Secrets Scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            gitleaks-report.json
            gitleaks-report.sarif

      - name: Comment PR with Gitleaks Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔐 Gitleaks Secrets Scan Results\n\n';

            if (fs.existsSync('gitleaks-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('gitleaks-report.json', 'utf8'));
                const findings = report || [];

                if (findings.length === 0) {
                  comment += '✅ No secrets detected!\n';
                } else {
                  comment += `⚠️ **${findings.length} potential secret(s) found!**\n\n`;
                  findings.slice(0, 5).forEach((finding, index) => {
                    comment += `${index + 1}. **${finding.RuleID}** in ${finding.File}:${finding.StartLine}\n`;
                  });
                  if (findings.length > 5) {
                    comment += `\n... and ${findings.length - 5} more\n`;
                  }
                }
              } catch (e) {
                comment += '✅ Scan completed\n';
              }
            } else {
              comment += '✅ No secrets detected\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  dependency-check:
    runs-on: ubuntu-latest
    name: OWASP Dependency Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Vulnerable App'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableRetired
            --exclude node_modules
            --exclude .git
            --exclude .github

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/

      - name: Check for Critical CVEs
        if: always()
        run: |
          if [ -f reports/dependency-check-report.json ]; then
            CRITICAL=$(cat reports/dependency-check-report.json | jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length')
            echo "Critical CVEs: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "⚠️ Critical vulnerabilities found"
            fi
          fi

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary
    needs: [secrets-scan, dependency-check]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v3

      - name: Generate Security Summary
        run: |
          echo "# 🔒 Complete Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "### Gitleaks (Secrets Detection)" >> security-summary.md
          if [ -f gitleaks-report/gitleaks-report.json ]; then
            echo "✅ Completed" >> security-summary.md
          else
            echo "⚠️ No report generated" >> security-summary.md
          fi
          echo "" >> security-summary.md
          echo "### Dependency Check (SCA)" >> security-summary.md
          if [ -f dependency-check-report/dependency-check-report.json ]; then
            echo "✅ Completed" >> security-summary.md
          else
            echo "⚠️ No report generated" >> security-summary.md
          fi
          cat security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
