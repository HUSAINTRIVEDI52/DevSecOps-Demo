name: Complete Security Scanning - Secrets & Dependencies

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    name: Gitleaks Secrets Scanning

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-report
          path: |
            gitleaks-report.json
            gitleaks-report.sarif

      - name: Comment PR with Gitleaks Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔐 Gitleaks Secrets Scan Results\n\n';

            if (fs.existsSync('gitleaks-report.json')) {
              try {
                const report = JSON.parse(fs.readFileSync('gitleaks-report.json', 'utf8'));
                const findings = report || [];

                if (findings.length === 0) {
                  comment += '✅ No secrets detected!\n';
                } else {
                  comment += `⚠️ **${findings.length} potential secret(s) found!**\n\n`;
                  findings.slice(0, 5).forEach((finding, index) => {
                    comment += `${index + 1}. **${finding.RuleID}** in ${finding.File}:${finding.StartLine}\n`;
                    comment += `   Match: \`${finding.Match.substring(0, 50)}...\`\n`;
                  });
                  if (findings.length > 5) {
                    comment += `\n... and ${findings.length - 5} more\n`;
                  }
                }
              } catch (e) {
                comment += '⚠️ Error parsing report\n';
              }
            } else {
              comment += '✅ Scan completed\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  dependency-check:
    runs-on: ubuntu-latest
    name: OWASP Dependency Check
    needs: secrets-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Vulnerable App'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableRetired
            --exclude node_modules
            --exclude .git
            --exclude .github

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: dependency-check-report
          path: reports/

      - name: Check for Critical CVEs
        if: always()
        run: |
          if [ -f reports/dependency-check-report.json ]; then
            CRITICAL=$(cat reports/dependency-check-report.json | jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length')
            HIGH=$(cat reports/dependency-check-report.json | jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length')

            echo "Critical CVEs: $CRITICAL"
            echo "High CVEs: $HIGH"

            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ Critical vulnerabilities found!"
              exit 1
            fi
          fi

      - name: Comment PR with Dependency Check Results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 📦 OWASP Dependency Check Results\n\n';

            if (fs.existsSync('reports/dependency-check-report.json')) {
              const report = JSON.parse(fs.readFileSync('reports/dependency-check-report.json', 'utf8'));
              const deps = report.dependencies || [];

              let criticalCount = 0;
              let highCount = 0;

              deps.forEach(dep => {
                if (dep.vulnerabilities) {
                  dep.vulnerabilities.forEach(vuln => {
                    if (vuln.severity === 'CRITICAL') criticalCount++;
                    if (vuln.severity === 'HIGH') highCount++;
                  });
                }
              });

              comment += `- **Critical**: ${criticalCount}\n`;
              comment += `- **High**: ${highCount}\n`;
              comment += `- **Total Dependencies**: ${deps.length}\n\n`;

              if (criticalCount > 0) {
                comment += '⚠️ **Critical vulnerabilities detected!**\n';
              } else {
                comment += '✅ No critical vulnerabilities\n';
              }
            } else {
              comment += 'No vulnerabilities detected.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  sonarqube-scan:
    runs-on: ubuntu-latest
    name: SonarQube SAST Scan
    needs: dependency-check

    services:
      sonarqube:
        image: sonarqube:latest
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLED: "true"
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/system/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>/dev/null || echo "No lint script configured"

      - name: Wait for SonarQube to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:9000/api/system/health; then
              echo "SonarQube is ready"
              exit 0
            fi
            echo "Waiting for SonarQube... ($i/30)"
            sleep 2
          done
          echo "SonarQube failed to start"
          exit 1

      - name: Create SonarQube project
        run: |
          curl -X POST "http://localhost:9000/api/projects/create" \
            -u admin:admin \
            -d "project=vulnerable-app&name=Vulnerable%20App" || true

      - name: Run SonarQube Scanner
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: http://localhost:9000
          SONAR_LOGIN: admin
          SONAR_PASSWORD: admin
        with:
          args: >
            -Dsonar.projectKey=vulnerable-app
            -Dsonar.projectName=Vulnerable App
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,test/**,.git/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Wait for SonarQube analysis to complete
        run: |
          for i in {1..60}; do
            STATUS=$(curl -s -u admin:admin \
              "http://localhost:9000/api/ce/activity?projectKey=vulnerable-app" | \
              grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)

            if [ "$STATUS" = "SUCCESS" ] || [ "$STATUS" = "FAILED" ]; then
              echo "Analysis completed with status: $STATUS"
              break
            fi
            echo "Waiting for analysis... ($i/60)"
            sleep 2
          done

      - name: Check SonarQube Quality Gate
        run: |
          QUALITY_GATE=$(curl -s -u admin:admin \
            "http://localhost:9000/api/qualitygates/project_status?projectKey=vulnerable-app" | \
            grep -o '"status":"[^"]*"' | cut -d'"' -f4)

          echo "Quality Gate Status: $QUALITY_GATE"

          if [ "$QUALITY_GATE" = "ERROR" ]; then
            echo "❌ Quality Gate FAILED"
            exit 1
          else
            echo "✅ Quality Gate PASSED"
            exit 0
          fi

      - name: Generate SonarQube Report
        if: always()
        run: |
          echo "=== SonarQube Analysis Report ===" > sonarqube-report.txt
          curl -s -u admin:admin \
            "http://localhost:9000/api/measures/component?component=vulnerable-app&metricKeys=bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density" \
            >> sonarqube-report.txt 2>&1 || echo "Report generation failed"
          cat sonarqube-report.txt

      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sonarqube-report
          path: sonarqube-report.txt

      - name: Comment PR with SonarQube Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('sonarqube-report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 SonarQube SAST Analysis\n\n\`\`\`\n${report}\n\`\`\``
            });

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary Report
    needs: [secrets-scan, dependency-check, sonarqube-scan]
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v3

      - name: Generate Security Summary
        run: |
          echo "# 🔒 Complete Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          echo "### 🔐 Gitleaks (Secrets Scanning)" >> security-summary.md
          if [ -f gitleaks-report/gitleaks-report.json ]; then
            SECRETS=$(cat gitleaks-report/gitleaks-report.json | jq 'length')
            echo "- Secrets found: $SECRETS" >> security-summary.md
          else
            echo "- ✅ No secrets detected" >> security-summary.md
          fi
          echo "" >> security-summary.md
          echo "### 📦 Dependency Check (SCA)" >> security-summary.md
          if [ -f dependency-check-report/dependency-check-report.json ]; then
            echo "- ✅ Completed" >> security-summary.md
          else
            echo "- ⚠️ No report generated" >> security-summary.md
          fi
          echo "" >> security-summary.md
          echo "### 🔍 SonarQube (SAST)" >> security-summary.md
          if [ -f sonarqube-report/sonarqube-report.txt ]; then
            echo "- ✅ Completed" >> security-summary.md
          else
            echo "- ⚠️ No report generated" >> security-summary.md
          fi
          echo "" >> security-summary.md
          echo "## Artifacts" >> security-summary.md
          echo "- Gitleaks Report" >> security-summary.md
          echo "- Dependency Check Report" >> security-summary.md
          echo "- SonarQube Report" >> security-summary.md
          cat security-summary.md

      - name: Upload Security Summary
        uses: actions/upload-artifact@v3
        with:
          name: security-summary
          path: security-summary.md

      - name: Comment PR with Security Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
